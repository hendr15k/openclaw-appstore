<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6c63ff">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Hendrik's AppStore</title>
<style>
:root{--bg:#0a0a0f;--card:#14141f;--border:#2a2a3a;--text:#e0e0e8;--text-muted:#9090a0;--accent:#6c63ff;--accent-glow:rgba(108,99,255,.3);--green:#00c853;--green-glow:rgba(0,200,83,.2);--yellow:#ffb300;--red:#ff6b6b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Gradient Header */
header{text-align:center;padding:60px 20px 26px;background:linear-gradient(135deg,#1a1a2e 0%,#0a0a0f 100%);border-bottom:1px solid var(--border)}
header .logo{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),#e040fb);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 30px var(--accent-glow)}
header .logo svg{width:40px;height:40px;color:#fff}
header h1{font-size:2em;font-weight:800;background:linear-gradient(135deg,var(--accent),#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:var(--text-muted);font-size:.95em}
.summary-bar{max-width:960px;margin:16px auto 0;padding:12px 14px;border:1px solid rgba(108,99,255,.18);border-radius:14px;background:rgba(108,99,255,.08);color:#cfd0ff;font-size:.9em;text-align:left}
.summary-bar strong{color:#fff}
.summary-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center}
.summary-pills{display:flex;flex-wrap:wrap;gap:8px}
.summary-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);font-size:.78em;color:var(--text-muted)}
.summary-pill.ok{color:#9ef0b5;border-color:rgba(0,200,83,.2);background:rgba(0,200,83,.08)}
.summary-pill.warn{color:#ffd78a;border-color:rgba(255,179,0,.2);background:rgba(255,179,0,.08)}
.summary-pill.offline{color:#ffb3b3;border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.08)}

/* Category filter */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cat-pill{padding:6px 14px;border-radius:999px;font-size:.82em;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;transition:all .2s}
.cat-pill:hover,.cat-pill.active{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent)}
.cat-pill .count{opacity:.6;font-weight:400}

/* App Grid */
.container{max-width:960px;margin:0 auto;padding:26px 20px 80px}
.app-grid{display:grid;gap:24px;margin-top:20px}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform .3s,box-shadow .3s}
.app-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px var(--accent-glow)}

/* App Header */
.app-header{padding:24px;display:flex;align-items:flex-start;gap:16px}
.app-icon{width:72px;height:72px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff}
.app-info{flex:1;min-width:0}
.app-info h2{font-size:1.3em;font-weight:700;margin-bottom:4px}
.app-info .subtitle{color:var(--text-muted);font-size:.9em;margin-bottom:12px}
.app-meta{display:flex;gap:10px;flex-wrap:wrap}
.app-meta span{display:inline-flex;align-items:center;gap:4px;font-size:.8em;color:var(--text-muted)}
.status-pill{padding:2px 8px;border-radius:999px;font-weight:700;letter-spacing:.02em;border:1px solid transparent}
.status-pill.ok{background:rgba(0,200,83,.1);color:var(--green);border-color:rgba(0,200,83,.2)}
.status-pill.warn{background:rgba(255,179,0,.1);color:var(--yellow);border-color:rgba(255,179,0,.2)}
.status-pill.offline{background:rgba(255,107,107,.1);color:var(--red);border-color:rgba(255,107,107,.2)}
.app-source{font-size:.76em;color:var(--text-muted)}

/* App Features */
.app-screenshot{padding:0 24px 12px}.app-screenshot a{display:block}.app-screenshot img{width:100%;max-width:200px;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.app-features{padding:0 24px 20px}
.feature-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.feature{background:rgba(108,99,255,.1);color:var(--accent);font-size:.75em;padding:4px 10px;border-radius:12px}
.release-note{margin-top:12px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#c9cada;font-size:.9em}
.release-note strong{color:#fff}

/* Download Section */
.app-downloads{padding:16px 24px 24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
.download-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:.85em;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer}
.download-btn.primary{background:linear-gradient(135deg,var(--accent),#e040fb);color:#fff;box-shadow:0 4px 15px var(--accent-glow)}
.download-btn.primary:hover{box-shadow:0 6px 25px var(--accent-glow);transform:scale(1.03)}
.download-btn.secondary{background:rgba(108,99,255,.1);color:var(--accent);border:1px solid rgba(108,99,255,.2)}
.download-btn.secondary:hover{background:rgba(108,99,255,.2)}
.download-btn .size{font-size:.75em;opacity:.7}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
footer{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.8em;border-top:1px solid var(--border)}
footer a{color:var(--accent)}

/* Responsive */
@media(max-width:600px){
header{padding:40px 16px 24px}
header h1{font-size:1.5em}
.app-header{flex-direction:column;align-items:center;text-align:center}
.app-downloads{justify-content:center}
.summary-row{justify-content:center;text-align:center}
.summary-bar{text-align:center}
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h1>Hendrik's AppStore</h1>
    <p>Open-Source Android Apps — direkt als APK herunterladen, mit Release-Diagnostik statt Blindflug</p>
    <div class="summary-bar" id="summaryBar">Lade GitHub Release Daten…</div>
</header>

<div class="container">
    <div class="filter-bar" id="categoryFilter">
        <button class="cat-pill active" id="cat-all" onclick="filterByCategory('all', this)">Alle <span class="count">0</span></button>
    </div>
    <div style="margin-bottom:14px;position:relative">
        <input id="searchInput" type="text" placeholder="Apps durchsuchen..." style="width:100%;padding:12px 16px 12px 44px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1em;outline:none" oninput="filterApps(this.value)" />
        <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Lade App-Informationen...</p>
    </div>
    <div id="appGrid" class="app-grid" style="display:none"></div>
</div>

<footer>
    <p>🦞 Powered by <a href="https://github.com/hendr15k">Hendrik Schmitz</a> — Alle Apps sind Open Source</p>
    <p>APK Downloads direkt von <a href="https://github.com">GitHub Releases</a></p>
</footer>

<script>
var APPS = [
    {
        id: 'Open Reader',
        owner: 'hendr15k',
        repo: 'open-reader',
        category: 'Lesen',
        tagLine: 'PDF, TXT → Hörbuch mit TTS',
        description: 'ElevenReader-Alternative — Lade PDFs, TXTs und HTML-Dateien hoch und lass sie dir vorlesen. Mit Sleep Timer, Bookmarks, Background Audio und Immersive Mode.',
        icon: '📖',
        iconBg: 'linear-gradient(135deg, #6c63ff, #e040fb)',
        features: ['PDF/TXT Upload', 'Text-to-Speech', 'Sleep Timer', 'Bookmarks', 'Background Audio', 'Offline-Speicher'],
        releaseTag: 'nightly',
        screenshot: 'https://hendr15k.github.io/openclaw-appstore/screenshots/openreader-screenshot.png'
    },
    {
        id: 'bookish-waffle',
        owner: 'hendr15k',
        repo: 'bookish-waffle',
        category: 'Wissenschaft',
        tagLine: 'Browser-basiertes Computer Algebra System',
        description: 'Web CAS mit Xcas-Syntax — Matrizen, Analysis, Algebra, Grafiken und mehr. 40 Tests, GitHub Actions CI, jetzt auch als Android-App verfügbar.',
        icon: '❇️',
        iconBg: 'linear-gradient(135deg, #00c853, #2196F3)',
        features: ['Computer Algebra', '40 Tests', '4x4+ Eigenvalues', 'map() Expressions', 'CI Pipeline', 'Android APK'],
        releaseTag: 'android-nightly',
        screenshot: 'https://hendr15k.github.io/openclaw-appstore/screenshots/bookish-waffle-screenshot.png'
    },
    {
        id: 'Sci-Fi Empfehlungen',
        owner: 'hendr15k',
        repo: 'sci-fi-app',
        category: 'Lesen',
        tagLine: '143 kuratierte Sci-Fi-Empfehlungen',
        description: 'Die Sci-Fi Empfehlungssammlung als App — mit 131 Cover-Bildern, Reading Tracker, Export und Filtern. Lädt Inhalte live von GitHub Pages.',
        icon: '🚀',
        iconBg: 'linear-gradient(135deg, #cc55ee, #6c63ff)',
        features: ['143 Titel', '131 Cover-Bilder', 'Reading Tracker', 'CSV/JSON Export', 'Dark/Light Mode', 'Random-Picker'],
        releaseTag: 'nightly',
        screenshot: 'https://hendr15k.github.io/openclaw-appstore/screenshots/sci-fi-empfehlungen-screenshot.png'
    },
    {
        id: 'OpenClaw',
        owner: 'hendr15k',
        repo: 'openclaw',
        category: 'Tools',
        tagLine: 'Dein persönlicher KI-Assistent',
        description: 'OpenClaw — Der KI-Assistent mit vollem Zugriff auf deine Geräte, Nachrichten, Kalender und Smart Home. Läuft auf jedem Android-Gerät.',
        icon: '🦞',
        iconBg: 'linear-gradient(135deg, #ff6600, #ff3366)',
        features: ['KI-Assistent', 'Smart Home', 'Nachrichten', 'Kalender', 'Open Source'],
        releaseTag: 'v2026.4.2-android',
        screenshot: 'https://hendr15k.github.io/openclaw-appstore/screenshots/openclaw-appstore-screenshot.png'
    }
];

var API_BASE = 'https://api.github.com/repos';

function fetchJson(url) {
    return fetch(url, { cache: 'no-store' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
}

function fetchReleaseInfo(app) {
    var exactUrl = API_BASE + '/' + app.owner + '/' + app.repo + '/releases/tags/' + app.releaseTag;
    var latestUrl = API_BASE + '/' + app.owner + '/' + app.repo + '/releases/latest';
    return fetchJson(exactUrl).then(function(exact) {
        if (exact) return { release: exact, source: 'exact' };
        return fetchJson(latestUrl).then(function(latest) {
            return { release: latest, source: latest ? 'latest' : 'none' };
        });
    });
}

function humanBytes(size) {
    if (!size && size !== 0) return '';
    var mb = size / (1024 * 1024);
    return (mb >= 1 ? mb.toFixed(1) : Math.round(size / 1024)) + (mb >= 1 ? ' MB' : ' KB');
}

function timeAgo(iso) {
    if (!iso) return '';
    var delta = Date.now() - new Date(iso).getTime();
    if (delta < 0) delta = 0;
    var mins = Math.round(delta / 60000);
    if (mins < 60) return mins + ' min';
    var hours = Math.round(mins / 60);
    if (hours < 24) return hours + ' h';
    var days = Math.round(hours / 24);
    return days + ' d';
}

function excerpt(text, maxLen) {
    if (!text) return 'Keine Release Notes verfügbar.';
    var clean = String(text).replace(/\r/g, ' ').replace(/\n+/g, ' ').replace(/\s+/g, ' ').trim();
    if (clean.length <= maxLen) return clean;
    return clean.slice(0, maxLen).replace(/\s+\S*$/, '') + '…';
}

function statusMeta(info) {
    if (!info || !info.release) {
        return { label: 'offline', cls: 'offline', detail: 'GitHub API nicht erreichbar oder kein Release gefunden.' };
    }
    if (info.source === 'exact') {
        return { label: 'exact tag', cls: 'ok', detail: 'Release-Tag wurde direkt gefunden.' };
    }
    return { label: 'latest fallback', cls: 'warn', detail: 'Exact-Tag fehlte — Dashboard nutzt das neueste Release als Fallback.' };
}

function buildAppCard(app, info) {
    var release = info.release;
    var status = statusMeta(info);
    var version = release ? release.tag_name : 'N/A';
    var published = release ? new Date(release.published_at).toLocaleDateString('de-DE') : '';
    var age = release ? timeAgo(release.published_at) : '';
    var totalDownloads = release ? (release.assets || []).reduce(function(s, a) { return s + (a.download_count || 0); }, 0) : 0;
    var assets = (release && release.assets) || [];
    var apkAssets = assets.filter(function(a) { return a.name && a.name.toLowerCase().endsWith('.apk'); });
    var downloadBtns = '';
    if (apkAssets.length > 0) {
        apkAssets.forEach(function(a) {
            var isDebug = a.name.indexOf('debug') >= 0;
            var isUnsigned = a.name.indexOf('unsigned') >= 0;
            var label = isDebug ? 'Debug APK' : isUnsigned ? 'Unsigned' : 'Release APK';
            var size = humanBytes(a.size);
            downloadBtns += '<a href="' + a.browser_download_url + '" class="download-btn ' + (isDebug || isUnsigned ? 'secondary' : 'primary') + '" target="_blank" rel="noopener">⬇️ ' + label + ' <span class="size">' + size + '</span></a>';
        });
    } else {
        downloadBtns = '<a href="https://github.com/' + app.owner + '/' + app.repo + '/releases" class="download-btn primary" target="_blank" rel="noopener">⬇️ Alle Releases öffnen</a>';
    }
    var releaseUrl = 'https://github.com/' + app.owner + '/' + app.repo + '/releases';
    var note = release ? excerpt(release.body || release.name || '', 180) : 'Keine Release-Notes verfügbar. Direkt die Release-Seite öffnen, falls der Fallback leer bleibt.';

    return '<div class="app-card" data-category="' + (app.category || 'General') + '">' +
        '<div class="app-header">' +
            '<div class="app-icon" style="background:' + app.iconBg + '">' + app.icon + '</div>' +
            '<div class="app-info">' +
                '<h2>' + app.id + '</h2>' +
                '<div class="subtitle">' + app.tagLine + '</div>' +
                '<div class="app-meta">' +
                    '<span class="status-pill ' + status.cls + '">' + status.label + '</span>' +
                    '<span>v' + version + '</span>' +
                    (published ? '<span>📅 ' + published + (age ? ' · ' + age + ' her' : '') + '</span>' : '') +
                    (totalDownloads > 0 ? '<span>⬇️ ' + totalDownloads.toLocaleString('de-DE') + ' Downloads</span>' : '') +
                    '<span>' + assets.length + ' Assets</span>' +
                    '<span class="app-source">' + status.detail + '</span>' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="app-features">' +
            '<div class="feature-list">' +
                app.features.map(function(f) { return '<span class="feature">' + f + '</span>'; }).join('') +
            '</div>' +
            '<p style="color:var(--text-muted);font-size:.9em">' + app.description + '</p>' +
            '<div class="release-note"><strong>Release-Notiz:</strong> ' + note + '</div>' +
            (app.screenshot ? '<div class="app-screenshot"><a href="' + app.screenshot + '" target="_blank" rel="noopener"><img src="' + app.screenshot + '" alt="Screenshot von ' + app.id + '" loading="lazy" /></a></div>' : '') +
        '</div>' +
        '<div class="app-downloads">' +
            downloadBtns +
            '<a href="' + releaseUrl + '" class="download-btn secondary" target="_blank" rel="noopener">📂 Release-Seite</a>' +
        '</div>' +
    '</div>';
}

function updateSummary(results) {
    var exact = results.filter(function(r) { return r.info.source === 'exact'; }).length;
    var fallback = results.filter(function(r) { return r.info.source === 'latest'; }).length;
    var offline = results.filter(function(r) { return !r.info.release; }).length;
    var ready = results.filter(function(r) { return r.info.release && r.info.release.assets && r.info.release.assets.length; }).length;
    var ts = new Date().toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'short' });

    document.getElementById('summaryBar').innerHTML =
        '<div class="summary-row">' +
            '<div><strong>' + results.length + ' Apps</strong> · ' + ready + ' mit Assets · zuletzt aktualisiert ' + ts + '</div>' +
            '<div class="summary-pills">' +
                '<span class="summary-pill ok">' + exact + ' exact</span>' +
                '<span class="summary-pill warn">' + fallback + ' fallback</span>' +
                '<span class="summary-pill offline">' + offline + ' offline</span>' +
            '</div>' +
        '</div>';
}

function loadAppStore() {
    Promise.all(APPS.map(function(app) {
        return fetchReleaseInfo(app).then(function(info) {
            return { app: app, info: info };
        });
    })).then(function(results) {
        var html = results.map(function(item) { return buildAppCard(item.app, item.info); }).join('');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('appGrid').innerHTML = html;
        document.getElementById('appGrid').style.display = 'grid';
        updateSummary(results);
        initCategoryFilter();
    }).catch(function() {
        document.getElementById('loading').innerHTML = '<p>⚠️ Konnte die App-Daten nicht laden.</p>';
        document.getElementById('summaryBar').innerHTML = '<strong>Warnung:</strong> Release-Daten konnten nicht geladen werden.';
        initCategoryFilter();
    });
}

var activeCategory = 'all';

function filterByCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.cat-pill').forEach(function(p) { p.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    applyFilters();
}

function initCategoryFilter() {
    var counts = { all: APPS.length };
    var cats = [];
    APPS.forEach(function(app) {
        var cat = app.category || 'General';
        if (!counts[cat]) { counts[cat] = 0; cats.push(cat); }
        counts[cat]++;
    });
    document.getElementById('count-all').textContent = counts.all;
    var container = document.getElementById('categoryFilter');
    cats.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'cat-pill';
        btn.setAttribute('data-cat', cat);
        btn.innerHTML = cat + ' <span class="count">' + counts[cat] + '</span>';
        btn.onclick = function() { filterByCategory(cat, btn); };
        container.appendChild(btn);
    });
}

function applyFilters() {
    var q = (document.getElementById('searchInput') || {}).value || '';
    var qLower = q.toLowerCase();
    var cards = document.querySelectorAll('.app-card');
    cards.forEach(function(card) {
        var matchCat = activeCategory === 'all' || card.getAttribute('data-category') === activeCategory;
        var matchSearch = !qLower || card.textContent.toLowerCase().indexOf(qLower) !== -1;
        card.style.display = matchCat && matchSearch ? '' : 'none';
    });
}

function filterApps(query) {
    applyFilters();
}

loadAppStore();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
</script>
</body>
</html>
