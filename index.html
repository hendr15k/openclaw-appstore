<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hendrik's AppStore</title>
<style>
:root{--bg:#0a0a0f;--card:#14141f;--border:#2a2a3a;--text:#e0e0e8;--text-muted:#9090a0;--accent:#6c63ff;--accent-glow:rgba(108,99,255,.3);--green:#00c853;--green-glow:rgba(0,200,83,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Gradient Header */
header{text-align:center;padding:60px 20px 40px;background:linear-gradient(135deg,#1a1a2e 0%,#0a0a0f 100%);border-bottom:1px solid var(--border)}
header .logo{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),#e040fb);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 30px var(--accent-glow)}
header .logo svg{width:40px;height:40px;color:#fff}
header h1{font-size:2em;font-weight:800;background:linear-gradient(135deg,var(--accent),#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:var(--text-muted);font-size:.95em}

/* App Grid */
.container{max-width:960px;margin:0 auto;padding:30px 20px 80px}
.app-grid{display:grid;gap:24px;margin-top:20px}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform .3s,box-shadow .3s}
.app-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px var(--accent-glow)}

/* App Header */
.app-header{padding:24px;display:flex;align-items:flex-start;gap:16px}
.app-icon{width:72px;height:72px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff}
.app-info{flex:1;min-width:0}
.app-info h2{font-size:1.3em;font-weight:700;margin-bottom:4px}
.app-info .subtitle{color:var(--text-muted);font-size:.9em;margin-bottom:12px}
.app-meta{display:flex;gap:12px;flex-wrap:wrap}
.app-meta span{display:inline-flex;align-items:center;gap:4px;font-size:.8em;color:var(--text-muted)}
.app-meta .badge{background:rgba(0,200,83,.1);color:var(--green);padding:2px 8px;border-radius:8px}

/* App Features */
.app-features{padding:0 24px 20px}
.feature-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.feature{background:rgba(108,99,255,.1);color:var(--accent);font-size:.75em;padding:4px 10px;border-radius:12px}

/* Download Section */
.app-downloads{padding:16px 24px 24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
.download-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:.85em;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer}
.download-btn.primary{background:linear-gradient(135deg,var(--accent),#e040fb);color:#fff;box-shadow:0 4px 15px var(--accent-glow)}
.download-btn.primary:hover{box-shadow:0 6px 25px var(--accent-glow);transform:scale(1.03)}
.download-btn.secondary{background:rgba(108,99,255,.1);color:var(--accent);border:1px solid rgba(108,99,255,.2)}
.download-btn.secondary:hover{background:rgba(108,99,255,.2)}
.download-btn .size{font-size:.75em;opacity:.7}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
footer{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.8em;border-top:1px solid var(--border)}
footer a{color:var(--accent)}

/* Responsive */
@media(max-width:600px){
.header{padding:40px 16px 30px}
header h1{font-size:1.5em}
.app-header{flex-direction:column;align-items:center;text-align:center}
.app-downloads{justify-content:center}
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h1>Hendrik's AppStore</h1>
    <p>Open-Source Android Apps — Direkt als APK herunterladen</p>
</header>

<div class="container">
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Lade App-Informationen...</p>
    </div>
    <div id="appGrid" class="app-grid" style="display:none"></div>
</div>

<footer>
    <p>🦞 Powered by <a href="https://github.com/hendr15k">Hendrik Schmitz</a> — Alle Apps sind Open Source</p>
    <p>APK Downloads direkt von <a href="https://github.com">GitHub Releases</a></p>
</footer>

<script>
// App Registry
var APPS = [
    {
        id: 'open-reader',
        owner: 'hendr15k',
        repo: 'open-reader',
        tagLine: 'PDF, TXT \u2192 H\u00f6rbuch mit TTS',
        description: 'ElevenReader-Alternative \u2014 Lade PDFs, TXTs und HTML-Dateien hoch und lass sie dir vorlesen. Mit Sleep Timer, Bookmarks, Background Audio und Immersive Mode.',
        icon: '\ud83d\udcd6',
        iconBg: 'linear-gradient(135deg, #6c63ff, #e040fb)',
        features: ['PDF/TXT Upload', 'Text-to-Speech', 'Sleep Timer', 'Bookmarks', 'Background Audio', 'Offline-Speicher', 'Immersive Mode', 'Grid/Library'],
        releaseTag: 'nightly'
    },
    {
        id: 'bookish-waffle',
        owner: 'hendr15k',
        repo: 'bookish-waffle',
        tagLine: 'Browser-basiertes Computer Algebra System',
        description: 'Web CAS mit Xcas-Syntax \u2014 Matrizen, Analysis, Algebra, Grafiken und mehr. 40 Tests, GitHub Actions CI, jetzt auch als Android-App verf\u00fcgbar.',
        icon: '\u2747\ufe0f',
        iconBg: 'linear-gradient(135deg, #00c853, #2196F3)',
        features: ['Computer Algebra', '40 Tests', '4x4+ Eigenvalues', 'map() Expressions', 'CI Pipeline', 'Android APK'],
        releaseTag: 'android-nightly'
    },
    {
        id: 'openclaw',
        owner: 'hendr15k',
        repo: 'openclaw',
        tagLine: 'Dein pers\u00f6nlicher KI-Assistent',
        description: 'OpenClaw \u2014 Der KI-Assistent mit vollem Zugriff auf deine Ger\u00e4te, Nachrichten, Kalender und Smart Home. L\u00e4uft auf jedem Android-Ger\u00e4t.',
        icon: '\ud83e\udd9e',
        iconBg: 'linear-gradient(135deg, #ff6600, #ff3366)',
        features: ['KI-Assistent', 'Smart Home', 'Nachrichten', 'Kalender', 'Open Source'],
        releaseTag: 'v2026.4.2-android'
    }
];

// GitHub API
var API_BASE = 'https://api.github.com/repos';

function fetchRelease(owner, repo, tag) {
    var url = API_BASE + '/' + owner + '/' + repo + '/releases/tags/' + tag;
    return fetch(url)
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
            if (!data) return fetchLatestRelease(owner, repo);
            return data;
        })
        .catch(function() { return fetchLatestRelease(owner, repo); });
}

function fetchLatestRelease(owner, repo) {
    return fetch(API_BASE + '/' + owner + '/' + repo + '/releases/latest')
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
}

function buildAppCard(app, release) {
    var version = release ? release.tag_name : 'N/A';
    var published = release ? new Date(release.published_at).toLocaleDateString('de-DE') : '';
    var totalDownloads = release ? (release.assets || []).reduce(function(s, a) { return s + (a.download_count || 0); }, 0) : 0;

    var assets = (release && release.assets) || [];
    var apkAssets = assets.filter(function(a) { return a.name && a.name.toLowerCase().endsWith('.apk'); });

    var downloadBtns = '';
    if (apkAssets.length > 0) {
        apkAssets.forEach(function(a) {
            var isDebug = a.name.indexOf('debug') >= 0;
            var isUnsigned = a.name.indexOf('unsigned') >= 0;
            var isPlay = a.name.indexOf('play') >= 0;
            var label = isDebug ? 'Debug APK' : isUnsigned ? 'Unsigned' : isPlay ? 'Release APK' : a.name.replace(/\.apk$/i, '');
            var size = a.size ? Math.round(a.size / 1024 / 1024) + ' MB' : '';
            var btnClass = isDebug || isUnsigned ? 'secondary' : 'primary';
            downloadBtns += '<a href="' + a.browser_download_url + '" class="download-btn ' + btnClass + '" target="_blank" rel="noopener">' +
                '\u2b07\uFE0F ' + label + ' <span class="size">' + size + '</span></a>';
        });
    } else {
        downloadBtns = '<a href="https://github.com/' + app.owner + '/' + app.repo + '/releases" class="download-btn primary" target="_blank" rel="noopener">\u2b07\uFE0F Alle Releases \u00f6ffnen</a>';
    }

    var releaseUrl = 'https://github.com/' + app.owner + '/' + app.repo + '/releases';

    return '<div class="app-card">' +
        '<div class="app-header">' +
            '<div class="app-icon" style="background:' + app.iconBg + '">' + app.icon + '</div>' +
            '<div class="app-info">' +
                '<h2>' + app.id.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }) + '</h2>' +
                '<div class="subtitle">' + app.tagLine + '</div>' +
                '<div class="app-meta">' +
                    '<span class="badge">v' + version + '</span>' +
                    (published ? '<span>\ud83d\udcc5 ' + published + '</span>' : '') +
                    (totalDownloads > 0 ? '<span>\u2b07\uFE0F ' + totalDownloads.toLocaleString('de-DE') + ' Downloads</span>' : '') +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="app-features">' +
            '<div class="feature-list">' +
                app.features.map(function(f) { return '<span class="feature">' + f + '</span>'; }).join('') +
            '</div>' +
            '<p style="color:var(--text-muted);font-size:.9em">' + app.description + '</p>' +
        '</div>' +
        '<div class="app-downloads">' +
            downloadBtns +
            '<a href="' + releaseUrl + '" class="download-btn secondary" target="_blank" rel="noopener">\ud83d\udcc2 Release-Seite</a>' +
        '</div>' +
    '</div>';
}

// Load all apps
function loadAppStore() {
    var loaded = 0;
    var html = '';

    APPS.forEach(function(app) {
        fetchRelease(app.owner, app.repo, app.releaseTag).then(function(release) {
            html += buildAppCard(app, release);
            loaded++;
            if (loaded === APPS.length) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('appGrid').innerHTML = html;
                document.getElementById('appGrid').style.display = 'grid';
            }
        }).catch(function() {
            html += buildAppCard(app, null);
            loaded++;
            if (loaded === APPS.length) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('appGrid').innerHTML = html;
                document.getElementById('appGrid').style.display = 'grid';
            }
        });
    });
}

loadAppStore();
</script>
</body>
</html>
