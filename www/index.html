<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6c63ff">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Hendrik's AppStore</title>
<style>
:root{--bg:#0a0a0f;--card:#14141f;--border:#2a2a3a;--text:#e0e0e8;--text-muted:#9090a0;--accent:#6c63ff;--accent-glow:rgba(108,99,255,.3);--green:#00c853;--green-glow:rgba(0,200,83,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Gradient Header */
header{text-align:center;padding:60px 20px 40px;background:linear-gradient(135deg,#1a1a2e 0%,#0a0a0f 100%);border-bottom:1px solid var(--border)}
header .logo{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),#e040fb);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 30px var(--accent-glow)}
header .logo svg{width:40px;height:40px;color:#fff}
header h1{font-size:2em;font-weight:800;background:linear-gradient(135deg,var(--accent),#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:var(--text-muted);font-size:.95em}

/* App Grid */
.container{max-width:1100px;margin:0 auto;padding:30px 20px 80px}
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:24px;margin-top:20px}
/* Card entrance animation */
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform .3s,box-shadow .3s;animation:fadeInUp .5s ease-out both}
.app-card:nth-child(1){animation-delay:.05s}
.app-card:nth-child(2){animation-delay:.12s}
.app-card:nth-child(3){animation-delay:.19s}
.app-card:nth-child(4){animation-delay:.26s}
.app-card:nth-child(5){animation-delay:.33s}
.app-card:nth-child(6){animation-delay:.40s}
.app-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px var(--accent-glow)}

/* App Header */
.app-header{padding:24px;display:flex;align-items:flex-start;gap:16px}
.app-icon{width:72px;height:72px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff}
.app-info{flex:1;min-width:0}
.app-info h2{font-size:1.3em;font-weight:700;margin-bottom:4px}
.app-info .subtitle{color:var(--text-muted);font-size:.9em;margin-bottom:12px}
.app-meta{display:flex;gap:12px;flex-wrap:wrap}
.app-meta span{display:inline-flex;align-items:center;gap:4px;font-size:.8em;color:var(--text-muted)}
.app-meta .badge{background:rgba(0,200,83,.1);color:var(--green);padding:2px 8px;border-radius:8px}

/* App Features */
.app-screenshot{padding:0 24px 12px}.app-screenshot a{display:block}.app-screenshot img{width:100%;max-width:180px;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 15px rgba(0,0,0,.3)}.app-features{padding:0 24px 20px}
.feature-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.feature{background:rgba(108,99,255,.1);color:var(--accent);font-size:.75em;padding:4px 10px;border-radius:12px}

/* Download Section */
.app-downloads{padding:16px 24px 24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
.download-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:.85em;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer}
.download-btn.primary{background:linear-gradient(135deg,var(--accent),#e040fb);color:#fff;box-shadow:0 4px 15px var(--accent-glow)}
.download-btn.primary:hover{box-shadow:0 6px 25px var(--accent-glow);transform:scale(1.03)}
.download-btn.secondary{background:rgba(108,99,255,.1);color:var(--accent);border:1px solid rgba(108,99,255,.2)}
.download-btn.secondary:hover{background:rgba(108,99,255,.2)}
.download-btn .size{font-size:.75em;opacity:.7}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text-muted)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
footer{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.8em;border-top:1px solid var(--border)}
footer a{color:var(--accent)}

/* Responsive */
@media(max-width:600px){
.app-grid{grid-template-columns:1fr!important}
.header{padding:40px 16px 30px}
header h1{font-size:1.5em}
.app-header{flex-direction:column;align-items:center;text-align:center}
.app-downloads{justify-content:center}
}

/* Skeleton loading */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.skeleton-block{background:linear-gradient(90deg,#1a1a2a 25%,#222238 50%,#1a1a2a 75%);background-size:800px 100%;animation:shimmer 1.5s ease-in-out infinite}
.skeleton-header{padding:24px;display:flex;gap:16px}.skeleton-icon{width:72px;height:72px;border-radius:18px;flex-shrink:0}
.skeleton-line{height:14px;border-radius:6px;margin-bottom:10px}
.skeleton-title{height:22px;width:50%;margin-bottom:14px}
.skeleton-features{padding:0 24px 16px}.skeleton-feature-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.skeleton-feat{width:80px;height:22px;border-radius:12px}
.skeleton-dl{padding:16px 24px 24px;border-top:1px solid var(--border);display:flex;gap:10px}.skeleton-btn{width:120px;height:40px;border-radius:12px}

/* Screenshot modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;cursor:pointer}
.modal-overlay.active{display:flex}
.modal-overlay img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);cursor:default}
.modal-close{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<header>
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h1>Hendrik's AppStore</h1>
    <p>Open-Source Android Apps — Direkt als APK herunterladen</p>
</header>

<div class="modal-overlay" id="screenshotModal" onclick="closeModal()"><button class="modal-close" onclick="closeModal()">✕</button><img id="modalImage" src="" alt="Screenshot" loading="lazy" /></div>

<div class="container">
    <div style="margin-bottom:20px;position:relative">
        <input id="searchInput" type="text" placeholder="Apps durchsuchen..." style="width:100%;padding:12px 16px 12px 44px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1em;outline:none" oninput="filterApps(this.value)" />
        <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Lade App-Informationen...</p>
    </div>
    <div id="appGrid" class="app-grid">
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-block skeleton-icon"></div><div style="flex:1"><div class="skeleton-line skeleton-title skeleton-block"></div><div class="skeleton-line skeleton-block" style="width:70%"></div></div></div><div class="skeleton-features"><div class="skeleton-feature-row"><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div></div></div><div class="skeleton-dl"><div class="skeleton-block skeleton-btn"></div><div class="skeleton-block skeleton-btn"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-block skeleton-icon"></div><div style="flex:1"><div class="skeleton-line skeleton-title skeleton-block"></div><div class="skeleton-line skeleton-block" style="width:60%"></div></div></div><div class="skeleton-features"><div class="skeleton-feature-row"><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div></div></div><div class="skeleton-dl"><div class="skeleton-block skeleton-btn"></div><div class="skeleton-block skeleton-btn"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-block skeleton-icon"></div><div style="flex:1"><div class="skeleton-line skeleton-title skeleton-block"></div><div class="skeleton-line skeleton-block" style="width:80%"></div></div></div><div class="skeleton-features"><div class="skeleton-feature-row"><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div></div></div><div class="skeleton-dl"><div class="skeleton-block skeleton-btn"></div><div class="skeleton-block skeleton-btn"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-block skeleton-icon"></div><div style="flex:1"><div class="skeleton-line skeleton-title skeleton-block"></div><div class="skeleton-line skeleton-block" style="width:55%"></div></div></div><div class="skeleton-features"><div class="skeleton-feature-row"><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div><div class="skeleton-block skeleton-feat"></div></div></div><div class="skeleton-dl"><div class="skeleton-block skeleton-btn"></div><div class="skeleton-block skeleton-btn"></div></div></div>
    </div>
</div>

<footer>
    <p>🦞 Powered by <a href="https://github.com/hendr15k">Hendrik Schmitz</a> — Alle Apps sind Open Source</p>
    <p>APK Downloads direkt von <a href="https://github.com">GitHub Releases</a></p>
</footer>

<div id="installBtn" style="display:none;position:fixed;bottom:20px;right:20px;z-index:999">
    <button onclick="installPWA()" style="background:linear-gradient(135deg,var(--accent),#e040fb);color:#fff;border:none;padding:14px 24px;border-radius:16px;font-size:.9em;font-weight:600;box-shadow:0 8px 30px var(--accent-glow);cursor:pointer">📲 Installieren</button>
</div>

<script defer src="app.js"></script>
</body>
</html>
